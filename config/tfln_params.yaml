physical_parameters:
  fsr_hz: 2.0e11                    # 200 GHz
  intrinsic_q: 1.0e7                # was 2.0e6
  coupling_q: 1.0e7
  n2_m2_per_w: 1.8e-19
  effective_mode_area_m2: 1.0e-13      # 0.1 µm² — tight ridge mode
  d2_rad_per_s2: 1.2566370614e7     # 2π × 2 MHz
  tau_th_s: 5.0e-6
  dn_dT_per_k: 4.0e-5
  Gamma_th: 0.1
  # ω₀ = 2π·c/λ = 2π·299792458/1.55e-6 ≈ 1.215e15 rad/s
  # κ_i = ω₀/Q_i = 1.215e15 / 1e7 = 1.215e8 rad/s
  kappa_i_rad_per_s: 1.215e8
  pyroelectric_coeff_c_per_m2_k: 9.6e-2
  eo_r33_m_per_v: 3.1e-11
  surface_state_density_per_m2: 1.0e12
  pump_wavelength_m: 1.55e-6
  # γ_LLE = γ_NLSE * v_g * FSR = 7.29 * (3e8/2.2) * 2e11 ≈ 1.99e20 J⁻¹s⁻¹
  # P_th = (κ/2)² / (γ_LLE * t_r * κ_c) = κ_i / (γ_NLSE * v_g) ≈ 122 mW
  # For soliton generation, use pin in range 150-600 mW (1.2-5x P_th)
  gamma_LLE_per_J_per_s: 1.99e20
  # Equivalently: gamma_LLE = gamma_NLSE / FSR / n_eff * c
  eps_r_z: 28.0                     # LN c-axis (z) relative permittivity ε₃₃ at room temperature
  t_ln_m: 4.0e-7                    # LN film thickness, 400 nm
  t_clad_top_m: 1.0e-6              # top cladding (SiO2 or air) thickness
  t_clad_bot_m: 2.0e-6              # buried oxide thickness
  eps_r_clad_top: 1.0               # air cladding (use 3.9 if SiO2-clad)
  eps_r_clad_bot: 3.9               # SiO2 substrate
  n0: 2.2                           # refractive index at pump wavelength
  rho_kg_per_m3: 4640.0             # LN mass density
  Cp_j_per_kg_k: 700.0              # LN specific heat capacity
  T_k: 300.0                        # ambient temperature
  kappa_th_w_per_m_k: 4.6           # LN thermal conductivity
  mode_volume_m3: 1.0e-15           # effective optical mode volume
  tau_carrier_s: 1.0e-7             # surface carrier relaxation time
  alpha_tccr: 1.0e-3                # TCCR dimensionless coupling factor
