physical_parameters:
  # ============================================================================
  # SiN microring — measured device. All values in SI base units.
  # Derived quantities computed inline; unmeasured/non-derivable values FLAGGED.
  # ω₀ = 2πc/λ = 2π·2.99792458e8 / 1.55e-6 = 1.21526e15 rad/s  (used throughout)
  # ============================================================================

  # ---- Cavity / coupling (measured) ----
  fsr_hz: 2.46e+10                  # 24.6 GHz
  intrinsic_q: 4.0e+7
  coupling_q: 1.0e+7
  # Loaded Q (derived): 1/Q_L = 1/Q_i + 1/Q_c = 1/4e7 + 1/1e7  ->  Q_L = 8.0e6
  # κ_i = ω₀/Q_i = 1.21526e15 / 4.0e7
  kappa_i_rad_per_s: 3.038e+7
  # κ_c = ω₀/Q_c = 1.21526e15 / 1.0e7 = 1.215e8 rad/s
  # κ_total = κ_i + κ_c = 1.519e8 rad/s  (device is OVER-COUPLED: κ_c ≈ 4·κ_i)
  # Authoritative coupling rate. intrinsic_q/coupling_q are kept as cross-check
  # sources; resolve_cavity_rates() prefers these explicit kappa_*_rad_per_s keys.
  kappa_c_rad_per_s: 1.215e+8

  # ---- Kerr nonlinearity (chi3) ----
  n2_m2_per_w: 2.4e-19
  # A_eff = 4.4µm × 0.8µm × Γ_confine.  Γ ∈ [0.90, 1.00] -> A_eff ∈ [3.168e-12, 3.52e-12].
  # FLAG: confinement not pinned; representative Γ = 0.95 used below.
  # Interpreted literally as the product (geometric core area × confinement).
  effective_mode_area_m2: 3.344e-12   # = 4.4e-6 · 0.8e-6 · 0.95
  # γ_NLSE = 2π·n2/(λ·A_eff) = 2π·2.4e-19 / (1.55e-6 · 3.344e-12) = 0.2909 W⁻¹m⁻¹
  # v_g    = c/ng = 2.99792458e8 / 2.086 = 1.43716e8 m/s
  # γ_LLE  = γ_NLSE · v_g · FSR = 0.2909 · 1.43716e8 · 2.46e10
  gamma_LLE_per_J_per_s: 1.029e+18    # RECOMPUTE if A_eff (confinement) changes
  # NB: γ_LLE ∝ 1/A_eff, so it spans [9.77e17, 1.085e18] across Γ ∈ [1.0, 0.90].

  # ---- Dispersion ----
  # D2 = 2π · 6 kHz = 2π · 6e3
  d2_rad_per_s2: 3.76991e+4
  # β₂ = D2/(2π·FSR)² = 3.76991e4 / (2π·2.46e10)² = 1.578e-18 s  (anomalous, D2>0)

  # ---- Indices (measured) ----
  pump_wavelength_m: 1.55e-6
  n0: 1.87                          # = n_eff (phase index); used in resonance thermo-optic pull
  # n_eff = 1.87 (phase), n_g = 2.086 (group). n_g used for v_g and cavity length.

  # ---- Mode volume (derived) ----
  # L_cav = c/(n_g·FSR) = 2.99792458e8 / (2.086 · 2.46e10) = 5.842e-3 m  (round-trip length)
  # V = A_eff · L_cav = 3.344e-12 · 5.842e-3
  mode_volume_m3: 1.954e-14         # scales with the A_eff (confinement) choice

  # ---- Operating point ----
  pin_w: 0.214                      # 214 mW
  # FLAG: dataset_generator sweeps `pin` via param_grid and does NOT read this key;
  #       it documents the experimental operating point only.
  # P_th (δω→0 MI onset) = κ³/(8·γ_LLE·κ_c)
  #     = (1.519e8)³ / (8 · 1.029e18 · 1.215e8) ≈ 3.5e-3 W ≈ 3.5 mW
  # Pin/P_th ≈ 61  -> 214 mW is well ABOVE MI onset (expect MI/soliton states).
  #       Exact prefactor is detuning-dependent; see energy-based check (Prompt D).

  # ---- Thermo-optic / thermal (SiN material constants; NOT measured here) ----
  dn_dT_per_k: 2.45e-5              # SiN material value (not in measurements)
  rho_kg_per_m3: 3.17e+3           # Si3N4 material value
  Cp_j_per_kg_k: 700.0             # Si3N4 material value
  kappa_th_w_per_m_k: 30.0         # Si3N4 bulk; unused in current dynamics
  T_k: 300.0                       # assumed ambient
  tau_th_s: 5.0e-6                 # FLAG: not derivable from given measurements; placeholder
                                   #       Sets the THERMAL DYNAMICS timescale only; the
                                   #       steady-state shift below is tau_th-independent.
  # ---- Thermo-optic coupling Gamma_th (lumped, dimensionless) ----------------
  # Single-pole thermal model:  dΔT/dt = -ΔT/τ_th + Γ_th·P_abs/(ρ·Cp·V)
  #   steady state:  ΔT_ss = R_th·P_abs,   R_th = τ_th·Γ_th/(ρ·Cp·V)   [K/W]
  # P_abs = κ_i·⟨|E|²⟩ is the intrinsically-dissipated power (W); V is the OPTICAL
  # mode volume (mode_volume_m3 above). Two physical factors were collapsed into
  # the old placeholder 0.1, which over-predicted ΔT by ~30× (shift ~80×κ):
  #   Γ_th = η_abs · (V_mode / V_thermal)
  #     • η_abs  — fraction of κ_i loss that is MATERIAL ABSORPTION (becomes heat),
  #                vs scattering/radiation that leaves the mode. Representative 0.3.
  #                FLAG: not measured; Γ_th ∝ η_abs, rescale linearly if pinned.
  #     • V_mode/V_thermal — the heat is stored in the thermal-diffusion volume
  #                V_thermal ≈ L_cav·π·L_th², L_th = √(α·τ_th), α = k_th/(ρ·Cp),
  #                which is ~63× the optical mode volume. Using V=V_mode in the ODE
  #                under-counts the heat capacity by exactly this ratio, so we
  #                divide it back out here.
  # Numbers (SiN device above): α = 30/(3.17e3·700) = 1.352e-5 m²/s,
  #   L_th = √(1.352e-5·5e-6) = 8.22e-6 m, V_thermal = 5.842e-3·π·(8.22e-6)²
  #        = 1.241e-12 m³, V_mode/V_thermal = 1.954e-14/1.241e-12 = 1.575e-2,
  #   Γ_th = 0.3·1.575e-2 = 4.72e-3.
  # Cross-check (τ_th cancels): R_th = τ_th·Γ_th/(ρ·Cp·V) = η_abs/(π·k_th·L_cav)
  #   = 0.3/(π·30·5.842e-3) = 0.545 K/W (line-source spreading resistance).
  #   ⟹ at the soliton operating point (Δω≈2–3κ, P_abs≈4–8 mW) the steady
  #   thermal_shift = (ω0/n0)·dn_dT·ΔT_ss ≈ 0.2–0.5×κ (was 10–80×κ). Sane.
  Gamma_th: 4.72e-3
  # Pre-flight tripwire: solve_lle_ssfm_jax asserts the analytic WORST-CASE
  # steady |thermal_shift| (evaluated at resonance Δω=0, where ⟨|E|²⟩ peaks)
  # stays below this multiple of κ, so a mis-set Γ_th fails loudly instead of
  # NaN-ing the SSFM field — independent of the requested detuning. The corrected
  # Γ_th peaks at ~7.8×κ at Δω=0 (soliton detunings Δω≈2–3κ sit at ~0.2–0.5×κ);
  # the old Γ_th=0.1 peaked at ~165×κ. Default 15.0 passes the former with ~2×
  # margin and trips the latter hard. Raise it if running deliberately higher P_in.
  thermal_shift_max_over_kappa: 15.0

  # ---- Quantum vacuum noise (arXiv:2604.05897 Sec. V.B.2, Eq. 126) -----------
  # Additive Langevin drive sqrt(kappa)*xi_mu(t) with
  # <xi_mu(t) xi_mu'^dagger(t')> = delta(t-t')*delta_mumu' (both loss baths
  # combined; coherent/vacuum baths only, no squeezing), implemented in the
  # truncated-Wigner c-number limit: per fine step dt_fine every fast-time
  # sample of E receives an i.i.d. complex Gaussian of per-quadrature std
  # sqrt(hbar*omega0*kappa*n_tau*dt_fine/4); undriven steady state = the
  # symmetric-ordered vacuum occupation of 1/2 photon per mode.
  # NOTE: booleans are encoded as 0/1 ints because every physical_parameters
  # leaf must parse as a plain number (tests/test_config.py locks this in).
  # Master switch. 0 = OFF (default): the solver is bit-identical to the
  # legacy (pre-quantum-noise) solver. 1 = ON.
  quantum_noise_enabled: 0
  # When the master switch is 1, replace the ad-hoc cold-start seed
  # (1e-3*|e_cw| Gaussian) with the vacuum-scale seed: CW state + complex
  # Gaussian of per-sample variance hbar*omega0*n_tau/2 (=> <n_mu> = 1/2 at
  # t=0). Ignored while the master switch is 0.
  quantum_noise_seed_vacuum_init: 1
  # Optional override of hbar*omega0 [J] used for the photon-energy
  # normalization. 0 = auto: hbar*omega0 = hbar*2*pi*c/pump_wavelength_m
  # = 1.054571817e-34 * 2*pi*2.99792458e8 / 1.55e-6 = 1.2816e-19 J.
  # (The pump-mode hbar*omega0 is used for ALL comb modes; <1% error over the
  # comb span.) Encoded as 0 rather than null for the numeric-leaves test.
  hbar_omega0_j: 0.0

  # ---- chi2 channels: ZERO for SiN (centrosymmetric: no Pockels, no pyroelectric) ----
  eo_r33_m_per_v: 0.0
  pyroelectric_coeff_c_per_m2_k: 0.0

  # ---- Waveguide/stack geometry (measured; METADATA ONLY) ----
  # Not used by the SiN noise model (pyro-EO screening is disabled, r33 = 0).
  # t_SiN_m: 8.0e-7
  # t_clad_top_m: 2.7e-6
  # t_clad_bot_m: 4.0e-6
  # eps_r_clad_top: 3.9            # SiO2 (wavelength-dependent; awaiting n(λ) .csv)
  # eps_r_clad_bot: 3.9            # SiO2
